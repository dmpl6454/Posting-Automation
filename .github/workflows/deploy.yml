name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: web
            dockerfile: docker/Dockerfile.web
          - image: worker
            dockerfile: docker/Dockerfile.worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "========================================="
          echo "  Deployment Placeholder"
          echo "========================================="
          echo ""
          echo "Images pushed to ghcr.io:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${IMAGE_TAG}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${IMAGE_TAG}"
          echo ""
          echo "To enable deployment, configure one of:"
          echo "  1. SSH-based deploy: Set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY secrets"
          echo "  2. Webhook-based deploy: Set DEPLOY_WEBHOOK_URL secret"
          echo ""
          echo "Example SSH deploy command:"
          echo "  ssh \$DEPLOY_USER@\$DEPLOY_HOST 'cd /opt/postautomation && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d'"
          echo ""
          echo "========================================="

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment succeeded for commit ${{ github.sha }}"
          else
            echo "Deployment failed for commit ${{ github.sha }}"
          fi
