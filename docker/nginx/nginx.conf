worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Rate limiting.
    # Zones are keyed per client IP — an office NAT shares ONE bucket across every
    # member's dashboard tabs (notification polling, batched tRPC), so the api zone
    # needs real headroom. Rejections MUST be 429 (nginx default is 503!) so clients
    # and humans can tell "slow down" apart from "the site is down".
    # Incident 2026-07-17: 2,002 5xx in 7 days were limit_req 503s, including a
    # Facebook OAuth callback bounced mid-consent.
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_status 429;
    limit_conn_status 429;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name postautomation.in www.postautomation.in postautomation.co.in www.postautomation.co.in;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Deterministic container healthcheck target (docker-compose healthcheck).
        # Must live on port 80 BEFORE the HTTPS redirect: the old probe hit
        # /api/health, got the 301 below, followed it to https://localhost, and
        # failed the TLS handshake -> container showed (unhealthy) for weeks
        # while serving fine.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # Domain-verification files (e.g. TikTok) live in the Next.js app's
        # public/ dir and are served by the web container — NOT from an nginx
        # webroot. Proxy them straight through (before the HTTPS redirect) so a
        # verification crawler that hits http:// can read the file without a
        # redirect hop. Was previously `root /usr/share/nginx/html;`, which
        # 404'd because the file was never copied into the nginx container.
        # Use a variable upstream (+ the http resolver above) so nginx defers
        # DNS resolution of `web` to request time and still starts if the web
        # container isn't up yet — matching the $backend pattern below.
        location ~* ^/tiktok.*\.txt$ {
            set $verify_backend http://web:3000;
            proxy_pass $verify_backend;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name postautomation.co.in www.postautomation.co.in;

        # SSL certificates (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/postautomation.co.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/postautomation.co.in/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # BUG-16: security headers are set authoritatively by the Next.js
        # middleware (apps/web/middleware.ts) — which also covers local dev
        # where nginx isn't in front. Setting them here too produced DUPLICATE
        # and CONFLICTING headers (e.g. X-Frame-Options: DENY from Next +
        # SAMEORIGIN from nginx). nginx forwards the upstream response headers
        # untouched, so we no longer re-add Strict-Transport-Security,
        # X-Frame-Options, X-Content-Type-Options, X-XSS-Protection, or
        # Referrer-Policy here. (Middleware uses the stricter X-Frame-Options:
        # DENY plus CSP frame-ancestors 'none', and emits HSTS in production.)
        # BUG-17: hide the nginx version banner.
        server_tokens off;

        # Use variable for upstream to allow dynamic resolution
        set $backend http://web:3000;

        # Static assets caching (Next.js _next/static)
        location /_next/static {
            proxy_pass $backend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Public files
        location /favicon.ico {
            proxy_pass $backend;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # NOTE: domain-verification files (e.g. /tiktok<token>.txt) are served
        # by the Next.js app from apps/web/public/ and fall through to the
        # `location /` proxy below — exactly like the Google site-verification
        # .html files. There is intentionally NO dedicated nginx block: the
        # previous `location ~* ^/tiktok.*\.txt$ { root /usr/share/nginx/html; }`
        # shadowed the working upstream file and returned 404.

        # File upload endpoint — large body, no rate limit, extended timeouts
        location /api/upload {
            client_max_body_size 512M;
            client_body_timeout 300s;

            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
        }

        # tRPC image generation (base64 payloads can be large)
        location /api/trpc/image. {
            client_max_body_size 100M;

            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # tRPC content repurpose — long-running: carousel (5-10 min), reel, AI video (1-3 min)
        # Longer prefix than /api/ so nginx picks this block automatically
        location /api/trpc/repurpose. {
            client_max_body_size 10M;

            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # OAuth provider callbacks (Facebook/Instagram/YouTube/LinkedIn/Twitter...).
        # One-shot, security-critical redirects carrying a single-use consent code.
        # NEVER rate-limit these: a 429/503 here burns the user's OAuth attempt
        # (incident: FB connect returning nginx 503 mid-consent, 2026-07-17).
        # Longer prefix than /api/ so nginx picks this block automatically.
        location /api/oauth/callback/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # API routes — rate limited
        location /api/ {
            limit_req zone=api burst=120 nodelay;

            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # SSE notifications — long-lived connections
        location /api/notifications/sse {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # Auth routes — rate limited (OAuth flows need multiple rapid requests)
        location /api/auth/ {
            limit_req zone=login burst=20 nodelay;

            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO media proxy — serves uploaded images/videos AND accepts direct
        # multipart PUTs from the browser using presigned URLs.
        location /media/ {
            set $minio http://minio:9000;
            rewrite ^/media/(.*)$ /postautomation-media/$1 break;
            proxy_pass $minio;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            # Allow large part uploads (S3 caps a single part at 5GB; we send 8MB parts)
            client_max_body_size 64M;
            client_body_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
            # Cache only GETs; never cache mutating verbs
            proxy_cache_valid 200 30d;
            proxy_cache_methods GET HEAD;
            add_header Cache-Control "public, max-age=2592000";
            # CORS preflight for browser-initiated direct uploads. MinIO does NOT
            # emit CORS headers itself when proxied via path-style, so we add them here.
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Expose-Headers "ETag, x-amz-version-id" always;
                add_header Access-Control-Max-Age 3000 always;
                add_header Content-Length 0;
                add_header Content-Type "text/plain charset=UTF-8";
                return 204;
            }
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Expose-Headers "ETag, x-amz-version-id" always;
        }

        # Presigned multipart uploads land here. The browser PUTs each part to a
        # presigned UploadPart URL minted by getS3PresignClient() (packages/api/src/lib/s3.ts).
        # With forcePathStyle:true the SDK puts the bucket in the path, so the signed
        # URL is /postautomation-media/<key>?X-Amz-... — the REAL bucket path.
        # CRITICAL: do NOT rewrite the path here. The SigV4 signature was computed over
        # /postautomation-media/<key>; any rewrite would change the canonical request MinIO
        # recomputes and cause SignatureDoesNotMatch (403). The /media/ block above rewrites
        # because its URLs are bucket-less GET reads; these are not. Keep them separate.
        location /postautomation-media/ {
            set $minio http://minio:9000;
            proxy_pass $minio;
            proxy_http_version 1.1;
            # Forward the ORIGINAL host (postautomation.co.in), NOT minio:9000.
            # Presigned SigV4 URLs sign X-Amz-SignedHeaders=host over the public host;
            # if MinIO receives Host: minio:9000 it recomputes a different signature and
            # returns 403 SignatureDoesNotMatch. The /media/ block above can use minio:9000
            # because those are unsigned public GET reads; signed PUTs must preserve $host.
            proxy_set_header Host $host;
            # 8MB parts (apps/web/lib/upload-multipart.ts PART_SIZE); 64M gives ample headroom
            client_max_body_size 64M;
            client_body_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
            proxy_cache_valid 200 30d;
            proxy_cache_methods GET HEAD;
            add_header Cache-Control "public, max-age=2592000";
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Expose-Headers "ETag, x-amz-version-id" always;
                add_header Access-Control-Max-Age 3000 always;
                add_header Content-Length 0;
                add_header Content-Type "text/plain charset=UTF-8";
                return 204;
            }
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Expose-Headers "ETag, x-amz-version-id" always;
        }

        # Short link redirects — fast path
        location /s/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other routes → Next.js
        location / {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Real upstream failures (deploy window, crashed/frozen web container) get
        # a human page that auto-retries instead of a bare "503/504 nginx" screen.
        # Only nginx-GENERATED errors land here (unreachable/timed-out upstream);
        # app-returned 5xx JSON passes through untouched (proxy_intercept_errors
        # stays off). Rate-limit rejections are 429 and NOT covered.
        error_page 502 503 504 @maintenance;
        location @maintenance {
            default_type text/html;
            add_header Retry-After 6 always;
            return 503 '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="6"><title>Back in a moment</title></head><body style="font-family:system-ui,sans-serif;display:flex;height:100vh;align-items:center;justify-content:center;margin:0"><div style="text-align:center"><h2>PostAutomation is briefly updating or under heavy load</h2><p>This page retries automatically every few seconds. Your work is safe.</p></div></body></html>';
        }
    }

    # HTTPS server — postautomation.in
    # Canonicalize all traffic to postautomation.co.in (the OAuth-registered domain).
    # Keeping both certificates so direct hits to .in still terminate TLS cleanly.
    server {
        listen 443 ssl http2;
        server_name postautomation.in www.postautomation.in;

        ssl_certificate     /etc/letsencrypt/live/postautomation.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/postautomation.in/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Let's Encrypt challenge passthrough (cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Domain-verification files: no dedicated block. A /tiktok<token>.txt hit
        # on .in falls through to the 301 below and resolves on the canonical
        # .co.in host (where the web container serves it from public/). The old
        # `root /usr/share/nginx/html;` block 404'd from an empty nginx webroot.

        # Everything else → 301 to canonical .co.in (preserves path + query)
        return 301 https://postautomation.co.in$request_uri;
    }
}
